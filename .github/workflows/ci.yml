name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'renovate.json'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'renovate.json'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        !startsWith(github.event.head_commit.message, '[skip ci]') && 
        (github.ref == 'refs/heads/master' || github.event_name == 'pull_request')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install system dependencies
        run:
          sudo apt install -y gcc-multilib

      - name: Build Release
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
        run: ./gradlew assembleRelease --warning-mode all --stacktrace

      - name: Upload Release
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: wekit-apk
          path: app/build/outputs/apk/release/*.apk

  upload-telegram:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ success() && github.ref == 'refs/heads/master' }}
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: wekit-apk
          path: artifacts

      - name: Find APK files
        id: find_apk
        run: |
          apks=$(ls artifacts/*.apk | tr '\n' ',')
          echo "apk_paths=$apks" >> $GITHUB_OUTPUT

      - name: Send APKs via Telegram API
        env:
          BOT_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA:           ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name || github.actor }}
          REPO:          ${{ github.repository }}
        run: |
          caption="🎉 *检测到新的 GitHub 推送！*
          *Commit SHA:* \`${SHA}\`
          \`\`\`
          ${{ github.event.head_commit.message || 'Manual Build' }}
          \`\`\`
          *提交者* \`${COMMIT_AUTHOR}\`
          [查看详情](https://github.com/${REPO}/commit/${SHA})"
          
          apks=(artifacts/*.apk)
          
          media_json=$(python3 -c "
          import json, os, sys
          caption = '''${{ github.event.head_commit.message || 'Manual Build' }}'''
          sha = os.environ['SHA']
          author = os.environ['COMMIT_AUTHOR']
          repo = os.environ['REPO']
          apks = sys.argv[1:]
          caption_text = (
          '🎉 *检测到新的 GitHub 推送！*\n'
          f'*Commit SHA:* \`{sha}\`\n'
          f'\`\`\`\n{caption}\n\`\`\`\n'
          f'*提交者* \`{author}\`\n'
          f'[查看详情](https://github.com/{repo}/commit/{sha})'
          )
          media = []
          for i, apk in enumerate(apks):
            name = f'apk{i}'
            item = {'type': 'document', 'media': f'attach://{name}'}
            if i == 0:
              item['caption'] = caption_text
              item['parse_mode'] = 'MarkdownV2'
            media.append(item)
            print(json.dumps(media))
            " artifacts/*.apk)
        
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMediaGroup" \
            -F chat_id="${CHAT_ID}" \
            -F media="${media_json}" \
            "${form_args[@]}"