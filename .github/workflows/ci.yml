name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        !startsWith(github.event.head_commit.message, '[skip ci]') && 
        (github.ref == 'refs/heads/master' || github.event_name == 'pull_request')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android,x86_64-linux-android,armv7-linux-androideabi,i686-linux-android

      - name: Cache Rust build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            app/src/main/rust/wekit-native/target
          key: rust-build-cache

      - name: Cache Gradle build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
          key: gradle-build-cache

      - name: Install system dependencies
        run: |
          sudo apt install -y gcc-multilib

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/wekit-keystore.jks

      - name: Build Release
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
        env:
          WEKIT_KEYSTORE_FILE: ${{ runner.temp }}/wekit-keystore.jks
          WEKIT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          WEKIT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          WEKIT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --warning-mode all --stacktrace

